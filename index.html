<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dla najelpszej kobiety na świecie</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Comic Sans MS, cursive;
    animation:tlo 6s infinite alternate;
}


@keyframes tlo{
    0%{background:#ff9ecf;}
    25%{background:#ffb3e6;}
    50%{background:#ffd6f2;}
    75%{background:#ff99cc;}
    100%{background:#ff66b2;}
}


h1{
    font-size:60px;
    text-align:center;
    background:linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, violet);
    -webkit-background-clip:text;
    color:transparent;
    animation:rainbow 3s linear infinite;
}


@keyframes rainbow{
    0%{background-position:0%}
    100%{background-position:200%}
}

img{
    margin-top:30px;
    width:250px;
    border-radius:20px;
}

</style>
</head>

<body>

<h1>miłego dnia kobiet domi ❤️</h1>

<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" alt="gif">

</body>
</html>
